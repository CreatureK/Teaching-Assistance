# 测试环境配置

# 数据库配置（使用内存数据库）
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2控制台配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 日志配置
logging.level.com.java_web.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# OpenAI配置（测试用）
openai.model.name=qwen-plus
openai.api.key=test-api-key
openai.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# openai.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1

# 禁用某些自动配置
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration 